name: Build & Release Admin (Android APK)

# Compila un APK de Android (debug-signed, instalable por "orígenes desconocidos")
# y lo publica en el Release del tag. La misma UI web (src/) que la app de escritorio.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar NDK
        run: |
          sdkmanager --install "ndk;26.1.10909125" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Setup Rust (targets Android)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache de Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Instalar dependencias
        run: npm install

      - name: Generar iconos
        run: npx tauri icon app-icon.png

      - name: Inicializar proyecto Android
        run: npx tauri android init --ci

      - name: Generar keystore efímero para firmar
        run: |
          keytool -genkeypair -v -keystore $RUNNER_TEMP/release.keystore \
            -alias iacc -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass iacc-admin -keypass iacc-admin \
            -dname "CN=IA Chart Copilot Admin, OU=Admin, O=IACC, C=CO"

      - name: Compilar APK (release, separado por arquitectura)
        run: npx tauri android build --apk --split-per-abi

      - name: Firmar y alinear los APK
        run: |
          BT=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          echo "build-tools: $BT"
          mkdir -p dist
          for apk in $(find src-tauri/gen/android -path "*release*" -name "*-unsigned.apk"); do
            base=$(basename "$apk" -unsigned.apk)
            "$BT/zipalign" -f 4 "$apk" "$RUNNER_TEMP/$base-aligned.apk"
            "$BT/apksigner" sign --ks $RUNNER_TEMP/release.keystore \
              --ks-pass pass:iacc-admin --key-pass pass:iacc-admin \
              --out "dist/$base.apk" "$RUNNER_TEMP/$base-aligned.apk"
            echo "firmado: dist/$base.apk"
          done
          ls -lh dist

      - name: Publicar APK en el Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
