name: Build & Release Admin (MSI)

# Se dispara al publicar un tag "v*" (ej: v1.0.0 -> git push origin v1.0.0)
# Compila el instalador de Windows y lo publica en Releases para descarga directa.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write # necesario para crear el Release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache de Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Instalar dependencias
        run: npm install

      - name: Generar iconos de la app
        run: npx tauri icon app-icon.png

      - name: Compilar (MSI + NSIS)
        run: npx tauri build

      - name: Listar artefactos generados
        shell: pwsh
        run: Get-ChildItem -Recurse src-tauri/target/release/bundle | Select-Object FullName

      - name: Publicar Release con los instaladores
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Admin ${{ github.ref_name }}
          body: |
            Panel de administración de IA Chart Copilot.

            Descarga el instalador para Windows (`.msi` recomendado) y ábrelo.
            Al iniciar, ingresa la URL de tu API y el Admin Token para conectarte.
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
